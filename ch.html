<!DOCTYPE html>
<html>
<head>
  <title>ch.html – CHECK</title>
</head>
<body>
<script>
  // Achse + Beam-Point (kannst du später aus TXTME lesen)
  const AXIS = "IN";      // OUT / IN / EXX
  const BP   = "Start";   // Start / Mid / High

  const axisValid = ["OUT", "IN", "EXX"].includes(AXIS);
  const bpValid   = ["Start", "Mid", "High"].includes(BP);

  const checkOK = axisValid && bpValid;

  if (checkOK) {
    // Sprung erlaubt → weiter zu index.html
    window.location.href = "index.html";
  } else {
    // Sprung blockiert → Erklärung im Klartext
    document.body.innerText =
      "SPRUNG BLOCKIERT\nAXIS oder BEAM-POINT ungültig.\nBitte TXTME prüfen.";
  }
</script>
</body>
</html>
